name: dacha_mobile
description: "Мобильное приложение для управления дачным участком."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP-клиент с интерцепторами для JWT и логирования.
  dio: ^5.7.0

  # Безопасное хранилище токенов: Keychain на iOS, EncryptedSharedPreferences на Android,
  # IndexedDB на Web. JWT — это секрет, в SharedPreferences класть нельзя.
  flutter_secure_storage: ^9.2.2

  # State management: ChangeNotifier + ChangeNotifierProvider.
  # Минимальный объём, которого нам хватит до конца проекта.
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
